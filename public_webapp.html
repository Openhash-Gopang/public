<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>K-Public</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap">
<script type="module" src="https://hondi.net/auth/subsystem-auth.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;overflow:hidden;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  font-size:15px;background:#fff;color:#111;-webkit-font-smoothing:antialiased}
:root{
  --sky:#0369a1;--sky-lt:#e0f2fe;--sky-dk:#075985;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f3f4f6;--chip-border:#e5e7eb;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── 앱 레이아웃 ── */
.app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto;background:#fff}

/* ── 상단 바 ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 12px) 16px 12px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:#fff;
}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-icon{width:28px;height:28px;background:var(--sky);border-radius:7px;
  display:flex;align-items:center;justify-content:center}
.topbar-icon svg{width:14px;height:14px;stroke:#fff;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.topbar-name{font-size:15px;font-weight:800;color:#111;letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:6px}
.auth-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:var(--chip-bg);color:var(--txt2);border:1px solid var(--chip-border);display:none}
.report-btn{
  display:flex;align-items:center;gap:4px;
  padding:6px 11px;border-radius:8px;font-size:12px;font-weight:700;
  background:#fff5f0;color:#c2410c;border:1px solid #fed7aa;cursor:pointer;
}
.report-btn svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none}

/* ── 채팅 화면 ── */
.chat-screen{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* ── 채팅 바디 ── */
.chat-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 12px;display:flex;flex-direction:column;
  gap:10px;background:#fff;
}

/* 인트로 섹션 */
.intro-section{
  display:flex;flex-direction:column;align-items:center;
  padding:36px 0 28px;gap:14px;
}
.intro-icon{
  width:64px;height:64px;border-radius:18px;
  background:var(--sky);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(3,105,161,.25);
}
.intro-icon svg{width:30px;height:30px;stroke:#fff;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.intro-title{font-size:20px;font-weight:800;color:#111;letter-spacing:-.4px;text-align:center}
.intro-sub{font-size:14px;color:var(--txt2);line-height:1.6;text-align:center}

/* 퀵 칩 */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 4px}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:20px;
  background:#fff;border:1.5px solid var(--chip-border);
  font-size:13px;font-weight:600;color:#374151;cursor:pointer;
  transition:border-color .12s,background .12s,color .12s;
  white-space:nowrap;
}
.chip svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.chip:hover,.chip:active{background:var(--sky-lt);border-color:var(--sky);color:var(--sky-dk)}

/* AI/사용자 버블 */
.b-ai{
  max-width:88%;align-self:flex-start;
  background:#f9fafb;border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;
  padding:10px 14px;font-size:14px;line-height:1.7;color:#111;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.b-user{
  max-width:88%;align-self:flex-end;
  background:var(--sky);color:#fff;
  border-radius:16px 16px 4px 16px;
  padding:10px 14px;font-size:14px;line-height:1.7;
}

/* ── 입력 영역 ── */
.chat-input-area{
  background:#fff;border-top:1px solid var(--border);
  padding:10px 12px calc(10px + var(--safe-b));
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
.chat-textarea{
  flex:1;background:#f3f4f6;border:1.5px solid transparent;
  border-radius:22px;padding:10px 16px;
  font-family:'Pretendard',sans-serif;font-size:14px;
  resize:none;outline:none;max-height:100px;line-height:1.5;
  transition:border-color .15s,background .15s;color:#111;
}
.chat-textarea::placeholder{color:var(--txt3)}
.chat-textarea:focus{border-color:var(--sky);background:#fff}
.chat-mic-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--chip-bg);border:1.5px solid var(--chip-border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;transition:background .12s;
}
.chat-mic-btn.active{background:#fee2e2;border-color:#fca5a5}
.chat-mic-btn svg{width:16px;height:16px;stroke:#4b5563;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.chat-mic-btn.active svg{stroke:#ef4444}
.chat-send-btn{
  width:40px;height:40px;border-radius:50%;background:var(--sky);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border:none;cursor:pointer;
  transition:background .12s;
}
.chat-send-btn:disabled{background:#bae6fd;cursor:not-allowed}
.chat-send-btn svg{width:16px;height:16px;stroke:#fff;stroke-width:2.2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);
  background:#111;color:#fff;border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:500;
  z-index:9999;opacity:0;transition:all .25s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <!-- 상단 바 -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg>
      </div>
      <span class="topbar-name">K-Public</span>
    </div>
    <div class="topbar-right">
      <span class="auth-badge" id="auth-badge">L0</span>
      <button class="report-btn" onclick="qs('공공 시설 신고해 줘')">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        신고
      </button>
    </div>
  </div>

  <!-- 채팅 화면 -->
  <div class="chat-screen" id="chat-screen">
    <div class="chat-body" id="mob-chat-body">

      <!-- 인트로 -->
      <div class="intro-section" id="intro-section">
        <div class="intro-icon">
          <svg viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg>
        </div>
        <div>
          <div class="intro-title">K-Public AI 공무원</div>
          <div class="intro-sub" style="margin-top:6px">등본 발급 · 허가 신청 · 신고 · 복지 안내<br>어떤 행정 업무든 말씀해 주세요.</div>
        </div>
        <div class="chip-row">
          <button class="chip" onclick="qs('주민등록등본 발급해 줘')">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            등본 발급
          </button>
          <button class="chip" onclick="qs('영업 허가 신청해 줘')">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            영업 허가
          </button>
          <button class="chip" onclick="qs('우리 동네 예산 알려줘')">
            <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            지역 예산
          </button>
          <button class="chip" onclick="qs('받을 수 있는 복지 지원금 알려줘')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            복지 안내
          </button>
          <button class="chip" onclick="qs('자동차세 납부 조회해 줘')">
            <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            세금 조회
          </button>
        </div>
      </div>

    </div>

    <!-- 입력 영역 -->
    <div class="chat-input-area">
      <textarea class="chat-textarea" id="mob-input" rows="1"
        placeholder="메시지를 입력하세요…"
        oninput="autoResize(this);updateSendBtn()"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();mobSend()}"></textarea>
      <button class="chat-mic-btn" id="mob-mic-btn" onclick="toggleMic()">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      </button>
      <button class="chat-send-btn" id="mob-send-btn" onclick="mobSend()" disabled>
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>
<div class="toast" id="mob-toast"></div>

<script>
// ── 상수 ──────────────────────────────────────────────────────
const PROXY = 'https://hondi-proxy.tensor-city.workers.dev';
const SP_URL = 'https://raw.githubusercontent.com/Openhash-Gopang/public/main/prompts/SP-KPUBLIC-v1_0.txt';
const SP_FALLBACK = `당신은 K-Public AI 공무원입니다. 고팡 생태계 공공 행정 서비스에서 운영됩니다.
시민의 행정 요청을 분석하고, 담당 기관·절차·필요 서류를 안내하며 대행 처리합니다.
웹 검색으로 최신 법령·조례를 실시간 확인합니다.
모바일 환경에 맞게 짧고 명확하게, 다음 단계를 항상 안내합니다.`;

// ── SP 동적 로드 ───────────────────────────────────────────────
const CFG = { systemPrompt: null };
async function loadSystemPrompt() {
  if (CFG.systemPrompt) return CFG.systemPrompt;
  try {
    const r = await fetch(SP_URL + '?t=' + Date.now());
    if (r.ok) { CFG.systemPrompt = await r.text(); return CFG.systemPrompt; }
  } catch(e) { console.warn('[SP] 로드 실패:', e.message); }
  CFG.systemPrompt = SP_FALLBACK;
  return CFG.systemPrompt;
}

// ── AI 호출 ───────────────────────────────────────────────────
async function callAI(messages) {
  const sp = await loadSystemPrompt();
  try {
    const r = await fetch(`${PROXY}/ai/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider:'deepseek', model:'deepseek-chat', system:sp, messages, max_tokens:2000 }),
    });
    if (!r.ok) throw new Error(`proxy ${r.status}`);
    const d = await r.json();
    return d.content || '잠시 후 다시 시도해 주세요.';
  } catch(e) {
    console.warn('[K-Public] DeepSeek 폴백 → Claude:', e.message);
    const r2 = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:sp, messages:messages.slice(-8) }),
    });
    const d2 = await r2.json();
    return d2.content?.find(c => c.type === 'text')?.text || '오류가 발생했습니다.';
  }
}

// ── UI 헬퍼 ───────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function updateSendBtn() {
  const btn = document.getElementById('mob-send-btn');
  if (btn) btn.disabled = !document.getElementById('mob-input').value.trim();
}

// ── 채팅 ──────────────────────────────────────────────────────
let hist = [];
let mc = 0;

function hideIntro() {
  const intro = document.getElementById('intro-section');
  if (intro) intro.style.display = 'none';
}

async function mobSend() {
  const inp = document.getElementById('mob-input');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  autoResize(inp);
  updateSendBtn();
  hideIntro();
  addMob(msg, 'user');
  hist.push({ role:'user', content:msg });
  const btn = document.getElementById('mob-send-btn');
  btn.disabled = true;
  const tid = addMob('…', 'ai');
  try {
    const txt = await callAI(hist.slice(-10));
    document.getElementById(tid)?.remove();
    addMob(txt, 'ai');
    hist.push({ role:'assistant', content:txt });
    _recordPdv(msg);
  } catch {
    document.getElementById(tid)?.remove();
    addMob('오류가 발생했습니다. 다시 시도해 주세요.', 'ai');
  }
  btn.disabled = false;
}

function addMob(text, type) {
  const id = 'mb' + (mc++);
  const body = document.getElementById('mob-chat-body');
  const d = document.createElement('div');
  d.id = id;
  d.className = type === 'user' ? 'b-user' : 'b-ai';
  d.innerHTML = text.replace(/\n/g, '<br>');
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
  return id;
}

function qs(s) {
  document.getElementById('mob-input').value = s;
  updateSendBtn();
  mobSend();
}

function toast(msg) {
  const t = document.getElementById('mob-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── PDV 표준 payload ───────────────────────────────────────────
function _recordPdv(userMsg) {
  try {
    const token = JSON.parse(sessionStorage.getItem('gopang_sso_token') || '{}');
    const user_guid = token.ipv6 || 'anonymous';
    fetch(`${PROXY}/pdv_log`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_guid,
        source: 'kpublic',
        report: {
          pdv_6w: {
            who:   user_guid,
            when:  new Date().toISOString(),
            where: window._gopangLocation || '위치 미확인',
            what:  'K-Public AI 공무원 채팅',
            how:   `민원: ${userMsg.slice(0, 60)}`,
            why:   '공공 행정 처리 대행',
          },
        },
      }),
    }).catch(() => {});
  } catch(e) { console.warn('[PDV]', e.message); }
}

// ── ctx_enc=b64 분기 ─────────────────────────────────────────
(function initCtx() {
  const params = new URLSearchParams(location.search);
  const ctxRaw = params.get('ctx') || '';
  const ctxEnc = params.get('ctx_enc');
  const ctx = ctxRaw
    ? (ctxEnc === 'b64'
        ? decodeURIComponent(escape(atob(ctxRaw)))
        : decodeURIComponent(ctxRaw))
    : null;
  if (ctx) setTimeout(() => qs(ctx), 300);
})();

// ── 마이크 — v3.6 패턴 ───────────────────────────────────────
let micActive = false, recognition = null, mediaRecorder = null, audioChunks = [];

function _micSetUI(active) {
  micActive = active;
  document.getElementById('mob-mic-btn')?.classList.toggle('active', active);
}

function _micStartWebSpeech(SR) {
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    const input = document.getElementById('mob-input');
    if (input && t) { input.value = t; autoResize(input); updateSendBtn(); }
    _micSetUI(false);
    setTimeout(mobSend, 100);
  };
  recognition.onerror = (e) => { _micSetUI(false); if (e.error !== 'aborted') toast('🎤 음성 인식 오류: ' + e.error); };
  recognition.onend = () => { _micSetUI(false); };
  recognition.start();
  _micSetUI(true);
}

async function _micStartMediaRecorder() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); _micSetUI(false); toast('🎤 iOS에서는 텍스트로 입력해 주세요.'); };
    mediaRecorder.start();
    _micSetUI(true);
  } catch { _micSetUI(false); toast('🎤 마이크 권한이 필요합니다.'); }
}

function toggleMic() {
  if (micActive) {
    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    _micSetUI(false); return;
  }
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!isIOS && SR) _micStartWebSpeech(SR);
  else if (isIOS && window.MediaRecorder) _micStartMediaRecorder();
  else toast('🎤 이 브라우저에서는 음성 인식을 지원하지 않습니다.');
}
</script>

<script>
/* ── 고팡 SSO 인증 콜백 ── */
window._onGopangAuth = function(user) {
  if (!user) return;
  const badge = document.getElementById('auth-badge');
  if (badge) { badge.textContent = 'Lv.' + (user.level || 0); badge.style.display = 'inline-block'; }
  try { sessionStorage.setItem('gopang_sso_token', JSON.stringify(user)); } catch(e) {}
  console.log('[K-Public] ✅ 인증 완료 —', user.level, user.ipv6?.slice(-8));
};
</script>
</body>
</html>
