<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/gopang-wallet.js"></script>
<script src="/pdv-history-client.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>K-Public — 민원 안내</title>
<meta name="description" content="K-Public 안내 AI와 대화를 통해 민원 유형을 파악하고 담당 기관·절차를 안내합니다.">

<!-- ── 고팡 공통 인증 (subsystem-auth) ── -->
<script type="module" src="https://hondi.net/auth/subsystem-auth.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --gov:     #001845;
  --nav:     #002D72;
  --pri:     #0057A8;
  --pri-lt:  #006CC3;
  --pri-bg:  #EBF3FC;
  --pri-bd:  #B8D4F0;
  --sur:     #FFFFFF;
  --bg:      #F2F5FA;
  --bdr:     #D1D9E6;
  --txt:     #1A202C;
  --sub:     #4A5568;
  --hint:    #718096;
  --grn:     #1B6B3A; --gbg:#E6F4EC; --gbd:#A3D9B8;
  --red:     #C01C28; --rbg:#FEE2E2;
  --org:     #C05621; --obg:#FEF3E2;
  --pur:     #5B2D8E; --pbg:#F0EAF8;
  --gld:     #96760A; --ybg:#FEF3CD;
  --font:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
  --r:10px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:15px;color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{font-family:var(--font)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(0,87,168,.2);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ── 상단바 ── */
#top-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));
  background:var(--gov);color:#fff;box-shadow:var(--sh);z-index:20;
}
.tb-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px}
.tb-icon{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px}
.tb-sub{font-size:11px;font-weight:400;opacity:.75;margin-left:2px}
.tb-gear{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.tb-gear:active{background:rgba(255,255,255,.22)}

/* ── 대화 스레드 ── */
#chat-thread{
  flex:1;overflow-y:auto;padding:18px 14px 10px;display:flex;flex-direction:column;gap:10px;
  -webkit-overflow-scrolling:touch;
}
.bubble{max-width:88%;padding:12px 14px;border-radius:14px;font-size:14.5px;line-height:1.65;white-space:normal;word-break:break-word;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.bubble-ai{align-self:flex-start;background:var(--sur);border:1px solid var(--bdr);border-top-left-radius:4px;color:var(--txt);box-shadow:var(--sh)}
.bubble-user{align-self:flex-end;background:var(--pri);color:#fff;border-top-right-radius:4px}
.bubble-typing{align-self:flex-start;display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--sur);border:1px solid var(--bdr);border-radius:14px;border-top-left-radius:4px;font-size:12.5px;color:var(--hint)}

/* ── 분석 카드 / 판결 요약 카드 ── */
.analysis-card{display:flex;flex-direction:column;gap:8px}
.ac-type{display:inline-block;align-self:flex-start;color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px}
.ac-row b{display:block;font-size:11.5px;color:var(--hint);font-weight:700;margin-bottom:2px}
.verdict-card{display:flex;flex-direction:column;gap:10px}
.vc-badge{font-size:11.5px;font-weight:700;color:var(--pri);background:var(--pri-bg);border:1px solid var(--pri-bd);border-radius:6px;padding:4px 8px;align-self:flex-start}
.vc-summary{font-size:14px;font-weight:600;line-height:1.7}
.vc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12.5px}
.vc-grid > div{background:var(--bg);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.vc-grid span{color:var(--hint);font-size:11px}
.vc-grid b{color:var(--pri);font-size:15px}
.vc-caution{font-size:11.5px;color:var(--hint);line-height:1.6;border-top:1px dashed var(--bdr);padding-top:8px}

/* ── 진행률 ── */
.progress-wrap{display:flex;flex-direction:column;gap:6px;min-width:220px}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--pri);transition:width .3s}
.progress-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--hint)}

/* ── 입력바 ── */
#input-bar{
  flex-shrink:0;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  background:var(--sur);border-top:1px solid var(--bdr);
}
.mic-btn{
  width:40px;height:40px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--bdr);background:var(--bg);
  color:var(--pri);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.mic-btn.recording{background:var(--rbg);border-color:#fca5a5;color:var(--red);animation:pulse 1s infinite}
.mic-btn svg{width:18px;height:18px}
#chat-input{
  flex:1;resize:none;max-height:120px;min-height:40px;padding:10px 14px;border-radius:20px;
  border:1.5px solid var(--bdr);font-family:var(--font);font-size:14.5px;line-height:1.5;background:var(--bg);color:var(--txt);
}
#chat-input:focus{outline:none;border-color:var(--pri);background:var(--sur)}
.send-btn{
  width:40px;height:40px;flex-shrink:0;border-radius:50%;border:none;background:var(--bdr);color:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;
}
.send-btn.active{background:var(--pri)}
.send-btn svg{width:17px;height:17px}
#mic-msg{margin:0 12px 8px;padding:9px 12px;border-radius:8px;font-size:11.5px;line-height:1.6}

/* ── 설정 시트 ── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:30}
.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;background:var(--sur);border-radius:16px 16px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .25s ease;z-index:31;
  box-shadow:0 -4px 20px rgba(0,0,0,.15);max-height:80vh;overflow-y:auto;
}
.sheet.open{transform:translateY(0)}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-hd h3{font-size:15.5px;font-weight:800}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub)}
.sheet label{font-size:12px;font-weight:700;color:var(--hint);display:block;margin-bottom:6px}
.sheet input[type=text],.sheet input[type=password]{
  width:100%;padding:11px 12px;border-radius:8px;border:1.5px solid var(--bdr);font-size:13.5px;font-family:var(--font);margin-bottom:6px;
}
.sheet-hint{font-size:11px;color:var(--hint);line-height:1.6;margin-bottom:14px}
.sheet-save{width:100%;padding:12px;border-radius:8px;border:none;background:var(--pri);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.sheet-save:active{background:var(--pri-lt)}
.attach-btn{
  width:36px;height:36px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--bdr);background:var(--bg);
  color:var(--sub);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.attach-btn:active{background:var(--pri-bg);color:var(--pri);border-color:var(--pri-bd)}
.attach-btn svg{width:16px;height:16px}
.file-chips{flex-shrink:0;display:flex;gap:6px;flex-wrap:wrap;padding:0 12px;margin-bottom:-2px}
.file-chips:empty{display:none;margin:0}
.file-chip{display:flex;align-items:center;gap:5px;background:var(--pri-bg);border:1px solid var(--pri-bd);border-radius:999px;padding:4px 10px 4px 12px;font-size:11.5px;color:var(--pri)}
.file-chip button{border:none;background:none;color:var(--pri);cursor:pointer;font-size:12px;line-height:1;padding:0}
.mic-btn.recording{background:var(--rbg);border-color:#fca5a5;color:var(--red);animation:pulse 1s infinite}
.mic-btn svg{width:18px;height:18px}
#chat-input{
  flex:1;resize:none;max-height:120px;min-height:40px;padding:10px 14px;border-radius:20px;
  border:1.5px solid var(--bdr);font-family:var(--font);font-size:14.5px;line-height:1.5;background:var(--bg);color:var(--txt);
}
#chat-input:focus{outline:none;border-color:var(--pri);background:var(--sur)}
.send-btn{
  width:40px;height:40px;flex-shrink:0;border-radius:50%;border:none;background:var(--bdr);color:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;
}
.send-btn.active{background:var(--pri)}
.send-btn svg{width:17px;height:17px}
#mic-msg{margin:0 12px 8px;padding:9px 12px;border-radius:8px;font-size:11.5px;line-height:1.6}

/* ── 설정 시트 ── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:30}

  position:fixed;left:0;right:0;bottom:0;background:var(--sur);border-radius:16px 16px 0 0;

}
.sheet.open{transform:translateY(0)}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-hd h3{font-size:15.5px;font-weight:800}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub)}

/* ── 모델 선택(설정 시트) — 2026-07-03 신설, UI 전용 ── */
.model-section{margin-top:18px;padding-top:14px;border-top:1px solid var(--bdr)}
.model-section > label{font-size:12px;font-weight:700;color:var(--hint);display:block;margin-bottom:8px}
.model-mode-toggle{display:flex;gap:6px;margin-bottom:10px}
.mode-btn{flex:1;padding:9px 6px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--sur);color:var(--sub);font-size:12.5px;font-weight:700;cursor:pointer}
.mode-btn.active{background:var(--pri-bg);border-color:var(--pri);color:var(--pri)}
#model-search{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--bdr);font-size:13px;font-family:var(--font);margin-bottom:8px}
#model-search:focus{outline:none;border-color:var(--pri)}
.model-list{max-height:220px;overflow-y:auto;border:1px solid var(--bdr);border-radius:8px;margin-bottom:8px}
.model-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--bdr);cursor:pointer}
.model-item-disabled{opacity:.45;cursor:not-allowed}
.model-item:last-child{border-bottom:none}
.model-item:active{background:var(--pri-bg)}
.model-item.selected{background:var(--pri-bg)}
.model-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.model-mode-toggle ~ #model-search ~ .model-list .model-check{border-radius:50%} /* single 모드일 때 라디오 느낌 */
.model-item.selected .model-check{background:var(--pri);border-color:var(--pri)}
.model-name{flex:1;min-width:0}
.model-name b{display:block;font-size:13px;font-weight:700;color:var(--txt)}
.model-name span{font-size:11px;color:var(--hint)}
.model-flag{font-size:11px;color:var(--hint);flex-shrink:0}
.model-empty{padding:16px;text-align:center;font-size:12.5px;color:var(--hint)}
.model-note{font-size:10.5px;color:var(--hint);line-height:1.6}
.ensemble-count{font-size:11px;color:var(--pri);font-weight:700;margin-bottom:8px;display:none}
.ensemble-count.show{display:block}
</style>
</head>
<body>

<header id="top-bar">
  <div class="tb-brand">
    <div class="tb-icon">🏛</div>
    <div>K-Public</div>
  </div>
  <button class="tb-gear" onclick="openSettings()" title="이용 안내">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09A1.65 1.65 0 0015 4.6a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  </button>
</header>

<main id="chat-thread"></main>

<div class="file-chips" id="file-chips"></div>
<footer id="input-bar">
  <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="파일 첨부">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
  </button>
  <input type="file" id="file-input" multiple accept=".txt,.pdf,.docx,.jpg,.jpeg,.png" style="display:none" onchange="handleAttach(this)">
  <button class="attach-btn" onclick="document.getElementById('cam-input').click()" title="사진 촬영">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
  </button>
  <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="handleAttach(this)">
  <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="음성 입력">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0"/><line x1="12" y1="22" x2="12" y2="18"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
  </button>
  <textarea id="chat-input" rows="1" placeholder="메시지를 입력하세요…"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()" title="전송">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</footer>

<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSettings()"></div>
<div class="sheet" id="settings-sheet">
  <div class="sheet-hd">
    <h3>AI 모델 설정</h3>
    <button class="sheet-close" onclick="closeSettings()">✕</button>
  </div>

  <div class="model-section" style="margin-top:0;padding-top:0;border-top:none">
    <label>AI 모델 선택</label>
    <div class="model-mode-toggle">
      <button type="button" class="mode-btn active" id="mode-single" onclick="setModelMode('single')">단일 모델</button>
      <button type="button" class="mode-btn" id="mode-ensemble" onclick="setModelMode('ensemble')">앙상블 (여러 모델 토론)</button>
    </div>
    <input type="text" id="model-search" placeholder="모델·회사 이름으로 검색 (예: Claude, Gemini, Qwen, HyperCLOVA)…" oninput="renderModelList()">
    <div id="model-list" class="model-list"></div>
    <div id="byok-key-section" style="display:none;margin-top:10px">
      <label id="byok-key-label" style="font-size:12px;font-weight:700;color:var(--hint);display:block;margin-bottom:6px"></label>
      <input type="password" id="byok-key-input" placeholder="API Key 입력" style="width:100%;padding:11px 12px;border-radius:8px;border:1.5px solid var(--bdr);font-size:13.5px;font-family:var(--font);margin-bottom:6px">
      <button type="button" onclick="saveByokKeyClick()" style="width:100%;padding:11px;border-radius:8px;border:none;background:var(--pri);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer">저장</button>
    </div>
    <div class="model-note">
      OpenAI · Google(Gemini) · xAI(Grok) · DeepSeek는 자신의 API 키로 직접 사용할 수
      있습니다(입력한 키의 사용 비용은 본인 부담이며, K-Public 서버로 전송되지 않고
      이 기기에만 저장됩니다). 그 외 모델(Claude 포함)과 앙상블(여러 모델 토론)
      모드는 아직 실제 연동 전이라 선택이 제한돼 있습니다 — 목록에 "연동 준비중"
      으로 표시됩니다. 아무 모델도 선택하지 않으면 기존처럼 K-Public 공유 계정
      (DeepSeek)이 처리합니다.
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// GWP 파라미터 파싱 (gopang → 새 탭 호출 시 전달)
// ══════════════════════════════════════════════════════════════
const _qs        = new URLSearchParams(location.search);
const GWP_MODE    = _qs.get('gwp') === '1';
const GWP_TOKEN   = _qs.get('token')  || '';
const GWP_ORIGIN  = _qs.get('origin') || '';
let   GWP_CTX     = '';
if (_qs.get('ctx')) {
  try {
    GWP_CTX = (_qs.get('ctx_enc') === 'b64')
      ? decodeURIComponent(escape(atob(_qs.get('ctx'))))
      : decodeURIComponent(_qs.get('ctx'));
  } catch(e) { GWP_CTX = ''; }
}
let _gwpSeedUsed = false;
const _sessionId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(36).slice(2));
const _sessionStartedAt = new Date().toISOString();

// ── 대화 종료 시 이중 보고: (a) 자기 PDV에 원문 시간순 저장, (b) 나만의
// AI 비서에게 6하원칙 보고(GWP_DONE). GWP 경유(gwp=1)일 때만 수행 —
// 직접 접속 시엔 opener가 없으므로 보고 대상 자체가 없다.
async function _reportSessionEnd(resultText, summaryLine) {
  if (!GWP_MODE) return;
  const now = new Date().toISOString();
  const guid = _govGuid();
  const transcript = conversationState.messages
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .map(m => `[${m.role === 'user' ? '사용자' : 'AI'}] ${m.content}`)
    .concat([`[AI] ${resultText}`])
    .join('\n\n');
  const whenObj  = { period_start: _sessionStartedAt, period_end: now };
  const whatText = summaryLine || `${AGENCY_ID} 상담 완료`;

  // (a) 서브시스템 자기 PDV — 대화 원문 시간순 저장
  try {
    await fetch(PROXY + '/pdv/report', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ report: {
        svc: AGENCY_ID, type: 'conversation_transcript', session_id: _sessionId,
        who: { ipv6: guid, role: 'user' },
        when: whenObj,
        where: { svc_url: location.href },
        what: { summary: transcript },
        how:  { method: 'gov_relay_conversation' },
        why:  { goal: whatText },
      }})
    });
  } catch(e) { console.warn('[PDV] 자기 기록 실패(무시):', e.message); }

  // (b) 나만의 AI 비서에게 6하원칙 보고 — engine.js가 사용자 PDV에 기록
  if (window.opener) {
    try {
      window.opener.postMessage({
        type: 'GWP_DONE',
        summary: whatText,
        session_id: _sessionId,
        reporter_svc: AGENCY_ID,
        pdvData: { who: guid, when: whenObj, where: location.href, what: whatText, how: 'gwp', why: whatText },
      }, GWP_ORIGIN || '*');
    } catch(e) { console.warn('[GWP_DONE] 보고 실패(무시):', e.message); }
  }
}

// ── K-Public 고유 규칙 (K-Public 공통 규칙은 서버가 앞에 자동으로 붙임) ──
// SP-COMMON-04(M1~M12) 원칙 준수: AI 주도·1턴 1질문·사용자 질문 우선 응답·
// 종료 기준선·감정 공감·음성입력 처리·상태 마커 길이 상한.
const AGENCY_PROMPT = `당신은 지방행정 민원 창구를 대신하는 K-Public 안내 AI입니다.
사용자와의 대화를 "당신이" 주도하여, 민원을 정확히 파악하고 담당 기관
(도청/시청/읍면동사무소 중 어디인지)과 처리 절차를 안내합니다.
실제 주민센터 창구 직원처럼 친절하고 사무적이지 않게 대화하세요.

현재 표본 지역은 제주특별자치도입니다. 사용자가 제주 지역 민원이면 아래
실제 기관 정보를 안내에 활용하세요(다른 지역이면 해당 지역의 동급 기관으로
안내하되, 정확한 연락처는 모르면 "관할 기관에 확인하십시오"라고 명시):
- 제주특별자치도청(광역 단위 민원): 제주시 문연로 6(연동), 대표전화 064-120
- 제주시청(기초자치단체 단위 민원): 제주시 광양9길 10(이도이동), 064-728-2114
- 한림읍사무소(읍면동 단위 민원, 제주시 한림읍 관할): 제주시 한림읍 한림상로
  132, 064-728-1521

절대 규칙:
1. 한 턴에 정확히 하나의 질문만 한다. 여러 질문을 한 번에 나열하지 않는다.
2. 사용자가 이미 말한 내용을 다시 묻지 않는다. 음성 입력 특성상 문장부호
   없이 여러 사실을 한꺼번에 말할 수 있다 — 이미 답변된 항목을 놓치지 말고,
   애매하면 넘겨짚지 말고 짧게 되물어 확인한다.
3. 사용자가 (질문이 아니라) 잡담·불만·답답함을 표현하면 한두 문장으로 짧게
   공감하고 다음 질문으로 돌아온다.
4. 사용자가 당신에게 진짜 질문("이거 왜 필요해요?", "얼마나 걸려요?" 등)을
   던지면 절대 무시하지 않는다. 먼저 그 질문에 짧고 솔직하게 답한 다음,
   원래 흐름으로 자연스럽게 되돌아온다.
5. 파악해야 할 항목: 민원 유형(전입신고/인허가/증명서 발급/세금 문의/기타
   등 구체적으로), 신청인 구분(개인/법인), 목적, 관할 지역(주소/거주지),
   기한이 급한지 여부. 민원 성격상 추가로 필요한 정보(예: 사업자등록 여부,
   대상 부동산 소재지 등)도 함께 확인한다.
6. 완벽주의에 빠지지 않는다 — 보통 3~5회 질문이면 충분한 정보가 모인다.
   충분히 파악됐다고 판단되면 더 묻지 않고 안내를 시작한다.

사용자에게 보여줄 답변 본문을 먼저 쓰고, 맨 마지막 줄에 반드시 아래 형식의
상태 마커를 한 줄로 덧붙인다(시스템이 파싱만 하고 사용자에게는 보이지
않으므로, 자연스러운 대화 톤 유지에만 신경 쓰면 된다). 각 필드는 반드시
100자 이내로 짧게 요약해 누적하라:

<<<STATE>>>{"type":"","applicant":"","purpose":"","region":"","urgency":"","extra":"","ready":false}<<<END>>>

- type: 민원 유형(구체적으로). 모르면 빈 문자열.
- applicant: 개인/법인 등 신청인 구분
- purpose: 민원 목적
- region: 관할 지역(주소·거주지)
- urgency: 기한 촉박 여부 및 사유
- extra: 그 외 민원 유형별로 중요한 추가 사실을 100자 이내로 누적
- ready: 안내를 시작해도 좋다고 판단되면 true, 아직 더 물어봐야 하면 false`;

function _parseInterviewState(raw) {
  const m = raw.match(/<<<STATE>>>([\s\S]*?)<<<END>>>/);
  let state = null;
  if (m) { try { state = JSON.parse(m[1]); } catch(e) { state = null; } }
  let visible = raw.replace(/<<<STATE>>>[\s\S]*?<<<END>>>/, '').trim();
  // 방어: 토큰 한도로 <<<END>>> 없이 마커가 잘린 경우, 마커 시작점부터 전부 잘라낸다.
  const cutIdx = visible.indexOf('<<<STATE>>>');
  if (cutIdx !== -1) visible = visible.slice(0, cutIdx).trim();
  return { visible, state };
}

// 공용 릴레이 호출 — BYOK 없음, K-Public 공통 규칙은 서버가 자동 삽입
// ══════════════════════════════════════════════════════════════
async function _pumpSSE(response, handleJson) {
  if (!response.ok) {
    let errMsg = `HTTP ${response.status}`;
    try { const errBody = await response.json(); errMsg = errBody.message || errBody.error?.message || errBody.error || errMsg; } catch(e) {}
    throw new Error(errMsg);
  }
  const reader = response.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buf = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      const t = line.trim();
      if (!t.startsWith('data:')) continue;
      const payload = t.slice(5).trim();
      if (payload === '[DONE]') continue;
      let json;
      try { json = JSON.parse(payload); } catch(e) { continue; }
      handleJson(json);
    }
  }
}

function _govGuid() { return kpubUser?.ipv6 || GWP_TOKEN || 'anonymous'; }

// BYOK 경로에서는 서버(/gov/relay)가 하던 "K-Public 공통 규칙 자동 삽입"을
// 클라이언트가 대신 해야 한다 — /llm/relay는 메시지를 그대로 통과시키기
// 때문이다(SP-COMMON-05 H2). 서버 강제만큼 완전하지는 않지만(사용자가
// 마음만 먹으면 우회 가능), 정상 경로에서는 항상 공통 규칙이 따라붙는다.
const K_PUBLIC_COMMON_RAW_URL = 'https://raw.githubusercontent.com/Openhash-Gopang/gopang/main/prompts/K-Public_common_v1_2.md'; // 2026-07-04 수정: 존재하지 않거나(또는 구버전) 참조하던 'K-Public_common_v1_0.md' 버그
let _kPublicCommonClientCache = null;
async function _fetchKPublicCommonClient() {
  if (_kPublicCommonClientCache) return _kPublicCommonClientCache;
  try {
    const r = await fetch(K_PUBLIC_COMMON_RAW_URL, { cache: 'no-cache' });
    if (r.ok) { _kPublicCommonClientCache = await r.text(); return _kPublicCommonClientCache; }
  } catch(e) { console.warn('[BYOK] K-Public 공통 규칙 로드 실패:', e.message); }
  return ''; // 실패해도 agencyPrompt만으로 서비스 지속
}

async function _govCallRaw(messages, opts = {}) {
  const { maxTokens = 1000, stream = false, onChunk = null } = opts;

  const byok = _activeByok();
  if (byok) {
    const kPublicCommon = await _fetchKPublicCommonClient();
    const systemContent = kPublicCommon ? `${kPublicCommon}\n\n---\n\n${AGENCY_PROMPT}` : AGENCY_PROMPT;
    try {
      return await _llmRelayCall(byok, [{ role:'system', content: systemContent }, ...messages], { maxTokens, stream, onChunk });
    } catch(e) {
      throw new Error(`${byok.name} 호출 실패: ${e.message} — 설정에서 API Key를 확인해 주세요.`);
    }
  }

  const resp = await fetch(GOV_RELAY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      guid: _govGuid(), agency: AGENCY_ID, agencyPrompt: AGENCY_PROMPT,
      messages, max_tokens: maxTokens, stream, tier: GOV_TIER,
    })
  });

  if (stream) {
    let fullText = '';
    await _pumpSSE(resp, (json) => {
      const delta = json.choices?.[0]?.delta?.content || '';
      if (delta) { fullText += delta; onChunk && onChunk(delta, fullText); }
    });
    return fullText;
  }

  let data;
  try { data = await resp.json(); } catch(e) { throw new Error(`HTTP ${resp.status}`); }
  if (!resp.ok || data.error) throw new Error(data.message || data.error || `HTTP ${resp.status}`);
  return data.choices?.[0]?.message?.content || '';
}

// 2026-07-04: PDV_HISTORY_REQUEST(P11) 가로채기 계층. _govCallRaw의 응답에
// [PDV_HISTORY_REQUEST:...] 태그가 있으면, pdv-history-client.js로 실제
// /pdv/query를 호출하고 그 결과를 컨텍스트에 주입해 한 번 더 호출한다.
// 동의가 필요해 리다이렉트가 시작된 경우(redirecting:true)엔 원 텍스트를
// 그대로 반환한다 — 어차피 곧 페이지 이동이 일어나 이후 반환값은 쓰이지 않는다.
async function _govCall(messages, opts = {}) {
  const raw = await _govCallRaw(messages, opts);
  if (!window.PdvHistoryClient || !/\[PDV(?:_HISTORY)?_REQUEST:/.test(raw)) return raw;

  const { interceptPdvTags } = window.PdvHistoryClient;
  const r = await interceptPdvTags(raw, {
    svc: AGENCY_ID, ipv6: _govGuid(),
    // TODO(확인 필요): 이 앱엔 /pdv/query가 요구하는 {exp, level} 형태의
    // auth_token을 만드는 기존 로직이 없었다(신규 기능이라 최초 통합).
    // L1 최소 요구 스코프를 통과시키기 위해 잠정적으로 1시간 유효한 L1
    // 토큰을 즉석에서 만든다 — 실제 사용자 인증 레벨과 무관하게 항상 L1로
    // 취급하는 셈이므로, 배포 전 실제 로그인 세션의 인증 레벨을 반영하도록
    // 교체할 것 (tax_repo와 동일한 임시 조치).
    authToken: { exp: Math.floor(Date.now()/1000) + 3600, level: 'L1' },
    resumeContext: { messages, opts },
  });
  if (!r) return raw;
  if (r.redirecting) return raw; // 페이지 이동 중 — 반환값은 사실상 안 쓰임

  const summaryText = (r.results || []).map(x => {
    if (x.error) return `(${x.scope} 이력 조회 실패: ${x.error})`;
    if (!x.summary || x.summary.available === false) return `(${x.scope} 이전 기록 없음)`;
    return `(${x.scope} 이전 기록: ${JSON.stringify(x.summary)})`;
  }).join('\n');

  // 태그를 제거한 원문 + 조회 결과를 함께 다시 넣어 최종 답변을 한 번 더 받는다.
  const cleaned = raw.replace(/\[PDV(?:_HISTORY)?_REQUEST:[^\]]+\]/g, '').trim();
  const followUp = [
    ...messages,
    { role: 'assistant', content: cleaned || '(이전 기록을 조회하겠습니다)' },
    { role: 'user', content: `[시스템: PDV 조회 결과]\n${summaryText}\n\n위 조회 결과를 반영해서 답변을 이어가 주세요.` },
  ];
  return _govCallRaw(followUp, opts);
}

// 2026-07-04: consent.html에서 돌아온 직후인지 확인 — PDV_HISTORY_REQUEST(P11) 파일럿.
document.addEventListener('DOMContentLoaded', async () => {
  if (!window.PdvHistoryClient) return;
  const back = window.PdvHistoryClient.checkPdvConsentReturn();
  if (!back) return;
  if (back.denied) {
    appendBubble('ai', '이전 기록 조회에 동의하지 않으셨네요. 처음부터 다시 도와드릴게요.');
    return;
  }
  if (back.granted) {
    appendBubble('ai', '동의 확인했습니다. 이전 기록을 반영해서 이어가겠습니다...');
    if (back.resumeContext?.messages) {
      try {
        const resumed = await _govCall(back.resumeContext.messages, back.resumeContext.opts || {});
        appendBubble('ai', resumed);
      } catch (e) {
        appendBubble('ai', `이어서 진행하는 중 오류가 발생했습니다: ${e.message}`);
      }
    }
  }
});

// 파일 첨부 / 카메라 (2026-07-03 신설, UI 전용)
// 백엔드(/gov/relay)는 아직 파일 업로드를 받지 않으므로, 텍스트류
// 파일은 읽어서 다음 사용자 메시지 앞에 자동으로 붙여 보내고, 이미지 등
// 그 외 파일은 칩으로 표시만 해 사용자가 상담 중 "이 서류를 첨부했다"는
// 사실을 대화로 언급할 수 있게 한다(실제 이미지 인식·OCR 연동은 범위 밖).
// ══════════════════════════════════════════════════════════════
let attachedFiles = [];
let attachedTextContext = '';

function handleAttach(inputEl) {
  const files = Array.from(inputEl.files || []);
  files.forEach(f => {
    attachedFiles.push(f);
    const chip = document.createElement('span');
    chip.className = 'file-chip';
    chip.innerHTML = `📎 ${escHtml(f.name)} <button type="button">✕</button>`;
    chip.querySelector('button').onclick = () => {
      attachedFiles = attachedFiles.filter(x => x !== f);
      chip.remove();
    };
    document.getElementById('file-chips').appendChild(chip);

    if (/\.(txt|md)$/i.test(f.name)) {
      const reader = new FileReader();
      reader.onload = () => { attachedTextContext += `\n\n[첨부파일 "${f.name}" 내용]\n${reader.result}`; };
      reader.readAsText(f);
    }
  });
  inputEl.value = '';
}

window._onGopangAuth = async function(user) {
  kpubUser = user;
  console.info('[K-Public Auth] 고팡 인증 완료 — Lv.' + user.level + ' / ' + user.via);
  kpubNickname = await _resolveNickname(user.ipv6 || GWP_TOKEN);
  startGreeting();
};

async function _resolveNickname(ipv6) {
  if (!ipv6) return '회원';
  try {
    const L1_URL = 'https://l1-hanlim.hondi.net/api/collections/profiles/records';
    const filter = encodeURIComponent(`guid='${ipv6}'`);
    const r = await fetch(`${L1_URL}?filter=${filter}&perPage=1`);
    const d = await r.json();
    return d.items?.[0]?.nickname || '회원';
  } catch(e) { console.warn('[K-Public] 닉네임 조회 실패:', e.message); return '회원'; }
}

function startGreeting() {
  if (conversationState.phase !== 'boot') return;
  const name = kpubNickname || '회원';

  // BUG-FIX(2026-07-03, 2차): 1차 수정은 GWP_CTX가 있으면 정적 인사+재질문을
  // 건너뛰긴 했지만 (a) "확인하고 있습니다…" 말풍선이 곧바로 이어지는 타이핑
  // 스피너와 의미가 겹쳐 "확인 중"을 두 번 말하는 것처럼 보였고, (b) 그 말풍선이
  // 사용자 발화보다 먼저 나와 순서가 거꾸로였고, (c) 원래 정적 인사에 있던
  // 책임범위 고지(응급 신고 안내 등)가 이 경로에서는 통째로 빠졌었다. 이제
  // 사용자 발화를 먼저 보여준 뒤, 자기소개 대신 반드시 유지해야 하는 고지
  // 문장만 짧게 보여주고, 곧바로 인터뷰 스피너로 넘어간다.
  if (GWP_CTX && !_gwpSeedUsed) {
    _gwpSeedUsed = true;
    appendBubble('user', `<i>(AI 비서로부터 전달됨)</i><br>${escHtml(GWP_CTX).replace(/\n/g,'<br>')}`);
    appendBubble('ai', `저는 K-Public입니다. 다만 저는 실제 행정처분을 내리거나 본인 확인이 필요한 신청·신고를 대신 접수할 수 없습니다 — 정확한 접수는 안내해 드리는 공식 채널에서 진행해 주셔야 합니다.`);
    _markGreeted();
    conversationState.phase = 'interviewing';
    _handleInterviewTurn(GWP_CTX);
    return;
  }

  if (!_hasGreetedBefore()) {
    appendBubble('ai', `
      안녕하세요. K-Public을 처음 이용하시는군요. 저는 지방행정 민원 안내 AI입니다.<br>
      <b>${escHtml(name)}</b>님의 민원을 파악해서 담당 기관(도청·시청·읍면동사무소 중 어디인지)과
      처리 절차를 안내해 드립니다. 다만 저는 실제 행정처분을 내리거나 본인 확인이
      필요한 신청·신고를 대신 접수할 수 없습니다 — 정확한 접수는 안내해 드리는
      공식 채널에서 진행해 주셔야 합니다.<br><br>
      어떤 민원으로 오셨는지 편하게 말씀해 주세요.
    `);
    _markGreeted();
  } else {
    appendBubble('ai', escHtml(_pickRepeatGreeting(name)));
  }

  conversationState.phase = 'interviewing';
}

setTimeout(() => { if (conversationState.phase === 'boot') { kpubNickname = '회원'; startGreeting(); } }, 4000);

// 메시지 전송 · 대화 분기
// ══════════════════════════════════════════════════════════════
async function sendMessage() {
  const ta = document.getElementById('chat-input');
  const text = ta.value.trim();
  if (!text) return;
  appendBubble('user', escHtml(text).replace(/\n/g,'<br>'));
  ta.value = ''; _micAutoResize(ta); _updateSendBtn();

  switch (conversationState.phase) {
    case 'interviewing': await _handleInterviewTurn(text); break;
    case 'generating':
      appendBubble('ai', '안내문을 준비하는 중입니다. 잠시만 기다려 주세요.');
      break;
    default: await _handleFreeQuestion(text); break;
  }
}

async function _handleInterviewTurn(text) {
  let userContent = text;
  if (GWP_CTX && !_gwpSeedUsed) {
    userContent = `[사용자가 사전에 "나만의 AI 비서"와 나눈 맥락 — 참고만 하고 그대로 인용하지 말 것]\n${GWP_CTX}\n\n[사용자의 이번 발화]\n${text}`;
    _gwpSeedUsed = true;
  }
  conversationState.messages.push({ role:'user', content: userContent });
  conversationState.turnCount++;

  const typing = appendTyping();
  try {
    const raw = await _govCall(conversationState.messages, { maxTokens: 800 });
    typing.remove();
    const { visible, state } = _parseInterviewState(raw);
    conversationState.messages.push({ role:'assistant', content: raw });

    if (state) {
      conversationState.caseState = {
        type:      state.type      || conversationState.caseState.type,
        applicant: state.applicant || conversationState.caseState.applicant,
        purpose:   state.purpose   || conversationState.caseState.purpose,
        region:    state.region    || conversationState.caseState.region,
        urgency:   state.urgency   || conversationState.caseState.urgency,
        extra:     state.extra     || conversationState.caseState.extra,
      };
    }

    appendBubble('ai', escHtml(visible || '죄송합니다, 방금 답변이 조금 끊겼네요. 다시 한번 말씀해 주시겠어요?').replace(/\n/g,'<br>'));

    if (state?.ready && conversationState.turnCount >= 2) {
      conversationState.phase = 'generating';
      setTimeout(runGuidanceGen, 400);
    }
  } catch(e) {
    typing.remove();
    appendBubble('ai', `⚠ ${escHtml(e.message)}`);
  }
}

// ══════════════════════════════════════════════════════════════
// 안내문 생성 — K-Law의 STEP 0~C처럼 무거운 다단계 생성이 필요 없어
// 단일 호출로 처리한다(gov-flash 티어, 추론 불필요).
// ══════════════════════════════════════════════════════════════
async function runGuidanceGen() {
  const cs = conversationState.caseState || {};
  const typing = appendTyping();

  const genPrompt = `아래 파악된 민원 정보를 바탕으로 안내문을 작성하세요.
민원유형: ${cs.type||''}
신청인구분: ${cs.applicant||''}
목적: ${cs.purpose||''}
관할지역: ${cs.region||''}
긴급여부: ${cs.urgency||''}
추가사실: ${cs.extra||''}

다음 형식으로 작성하세요(마크다운 헤더 없이 평문 단락으로):
1) 담당 기관(도청/시청/읍면동사무소 중 정확히 어디인지, 구체적 부서명까지 가능하면)
2) 필요 서류
3) 처리 절차(단계별로 간결하게)
4) 예상 소요 기간(확실하지 않으면 그렇게 명시)
5) 유의사항(있다면)
마지막 줄에 "정확한 접수·처리는 반드시 위 기관의 공식 채널(정부24, 해당 기관 홈페이지 또는
방문·전화)을 통해 진행하십시오."를 반드시 포함하세요. 상태 마커는 붙이지 마세요.`;

  try {
    const result = await _govCall([...conversationState.messages, { role:'user', content: genPrompt }], { maxTokens: 1200 });
    typing.remove();
    appendBubble('ai', `
      <div class="verdict-card">
        <div class="vc-badge">민원 안내</div>
        <div class="vc-summary" style="font-weight:400;font-size:13.5px;line-height:1.8">${escHtml(result).replace(/\n/g,'<br>')}</div>
      </div>
    `);
    conversationState.phase = 'done';
    conversationState.messages.push({ role:'assistant', content: result });
    _reportSessionEnd(result, (cs.type || cs.purpose || '') + ' 관련 상담 완료').catch(()=>{});
  } catch(e) {
    typing.remove();
    appendBubble('ai', `⚠ 안내문 생성 중 오류: ${escHtml(e.message)}`);
    conversationState.phase = 'interviewing';
  }
}

async function _handleFreeQuestion(text) {
  conversationState.messages.push({ role:'user', content: text });
  const typing = appendTyping();
  try {
    const resp = await _govCall(conversationState.messages, { maxTokens: 800 });
    typing.remove();
    appendBubble('ai', escHtml(resp).replace(/\n/g,'<br>'));
    conversationState.messages.push({ role:'assistant', content: resp });
  } catch(e) {
    typing.remove();
    appendBubble('ai', `⚠ 오류: ${escHtml(e.message)}`);
  }
}

// BYOK(자기 API 키) 실제 연동 — /llm/relay가 지원하는 호스트만 가능
// worker.js ALLOWED_LLM_RELAY_HOSTS: OpenAI · Google(Gemini, OpenAI 호환
// 레이어) · xAI(Grok) · DeepSeek · OpenRouter(현재 미사용) 뿐이다.
// Anthropic은 스키마가 달라 의도적으로 제외돼 있다(worker.js 주석 참조).
// 여기 없는 벤더는 현재 실제 호출이 불가능하므로 UI에서 선택을 막는다 —
// "선택은 되는데 실제로는 공유 계정이 대신 처리되는" 조용한 오작동을 방지.
// ══════════════════════════════════════════════════════════════
const LLM_RELAY_PROVIDERS = {
  'OpenAI':    { baseUrl: 'https://api.openai.com/v1', provider: 'openai' },
  'Google':    { baseUrl: 'https://generativelanguage.googleapis.com/v1beta/openai', provider: 'google' },
  'xAI':       { baseUrl: 'https://api.x.ai/v1', provider: 'xai' },
  'DeepSeek':  { baseUrl: 'https://api.deepseek.com', provider: 'deepseek' },
};
// 카탈로그 표시명 → 벤더 API가 실제로 받는 model id. worker.js가 이미
// 검증해 쓰고 있는 값(예: deepseek-chat/deepseek-reasoner)은 그대로 가져왔고,
// 나머지는 각 벤더의 공개 문서 기준 통상적인 id 표기다 — 벤더가 모델명을
// 개정하면 이 표도 함께 갱신해야 한다.
const MODEL_API_ID = {
  'OpenAI:GPT-4.1':                'gpt-4.1',
  'OpenAI:GPT-4o':                 'gpt-4o',
  'OpenAI:o3':                     'o3',
  'OpenAI:o3-mini':                'o3-mini',
  'Google:Gemini 2.5 Pro':         'gemini-2.5-pro',
  'Google:Gemini 2.5 Flash':       'gemini-2.5-flash',
  'Google:Gemini 2.0 Flash':       'gemini-2.0-flash',
  'xAI:Grok 4':                    'grok-4',
  'xAI:Grok 3':                    'grok-3',
  'xAI:Grok 3 mini':               'grok-3-mini',
  'DeepSeek:DeepSeek V4':          'deepseek-chat',
  'DeepSeek:DeepSeek R2':          'deepseek-reasoner',
};
function _isModelRelaySupported(vendor, name) {
  return !!(LLM_RELAY_PROVIDERS[vendor] && MODEL_API_ID[vendor + ':' + name]);
}
const BYOK_KEY_STORAGE_PREFIX = 'gov_byok_key_';
function saveByokKey(modelKey, key) {
  try { if (key) localStorage.setItem(BYOK_KEY_STORAGE_PREFIX + modelKey, key); else localStorage.removeItem(BYOK_KEY_STORAGE_PREFIX + modelKey); } catch(e) {}
}
function loadByokKey(modelKey) {
  try { return localStorage.getItem(BYOK_KEY_STORAGE_PREFIX + modelKey) || ''; } catch(e) { return ''; }
}
// 지금 유효한 BYOK 설정을 돌려준다 — 단일 모드 + 지원 벤더 + 키 등록까지
// 전부 갖춰졌을 때만 값을 반환한다. 하나라도 빠지면 null(=공유 계정 사용).
function _activeByok() {
  if (modelMode !== 'single' || selectedModels.length !== 1) return null;
  const key = selectedModels[0];
  const [vendor, name] = key.split(':');
  if (!_isModelRelaySupported(vendor, name)) return null;
  const apiKey = loadByokKey(key);
  if (!apiKey) return null;
  return { vendor, name, apiKey, ...LLM_RELAY_PROVIDERS[vendor], model: MODEL_API_ID[key] };
}
async function _llmRelayCall(byok, messages, opts = {}) {
  const { maxTokens = 1200, stream = false, onChunk = null } = opts;
  const resp = await fetch(PROXY + '/llm/relay', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      provider: byok.provider, baseUrl: byok.baseUrl, apiKey: byok.apiKey, model: byok.model,
      messages, max_tokens: maxTokens, stream,
    })
  });
  if (stream) {
    let fullText = '';
    await _pumpSSE(resp, (json) => {
      const delta = json.choices?.[0]?.delta?.content || '';
      if (delta) { fullText += delta; onChunk && onChunk(delta, fullText); }
    });
    return fullText;
  }
  let data;
  try { data = await resp.json(); } catch(e) { throw new Error(`HTTP ${resp.status}`); }
  if (!resp.ok || data.error) throw new Error(data.error?.message || data.error || data.message || `HTTP ${resp.status}`);
  return data.choices?.[0]?.message?.content || '';
}

let modelMode = localStorage.getItem('gov_model_mode') || 'single';
let selectedModels = (() => {
  try { return JSON.parse(localStorage.getItem('gov_selected_models') || '[]'); } catch(e) { return []; }
})();

function setModelMode(mode) {
  modelMode = mode;
  localStorage.setItem('gov_model_mode', mode);
  document.getElementById('mode-single').classList.toggle('active', mode === 'single');
  document.getElementById('mode-ensemble').classList.toggle('active', mode === 'ensemble');
  // 단일 모드로 되돌아가면 선택을 1개로 축소
  if (mode === 'single' && selectedModels.length > 1) {
    selectedModels = selectedModels.slice(0, 1);
    localStorage.setItem('gov_selected_models', JSON.stringify(selectedModels));
  }
  renderModelList();
}

function toggleModel(key) {
  const [vendor, name] = key.split(':');
  if (!_isModelRelaySupported(vendor, name)) {
    _micShowMsg?.('<strong>⚙️ 아직 연동되지 않은 모델입니다.</strong> 지금은 OpenAI·Google·xAI·DeepSeek만 자기 API 키로 사용할 수 있습니다.', 'info');
    return;
  }
  if (modelMode === 'ensemble') {
    _micShowMsg?.('<strong>⚙️ 앙상블(여러 모델 토론)은 아직 준비 중입니다.</strong> 지금은 단일 모델만 선택해 주세요.', 'info');
    return;
  }
  selectedModels = [key];
  localStorage.setItem('gov_selected_models', JSON.stringify(selectedModels));
  renderModelList();
  renderByokKeyInput();
}

function renderModelList() {
  const q = (document.getElementById('model-search')?.value || '').trim().toLowerCase();
  const list = document.getElementById('model-list');
  if (!list) return;
  const filtered = MODEL_CATALOG.filter(m =>
    !q || m.name.toLowerCase().includes(q) || m.vendor.toLowerCase().includes(q)
  );
  if (filtered.length === 0) {
    list.innerHTML = '<div class="model-empty">검색 결과가 없어요.</div>';
    return;
  }
  list.innerHTML = filtered.map(m => {
    const key = m.vendor + ':' + m.name;
    const sel = selectedModels.includes(key);
    const supported = _isModelRelaySupported(m.vendor, m.name);
    const disabledCls = supported ? '' : ' model-item-disabled';
    const badge = supported ? '' : '<span class="model-flag" style="color:var(--hint)">연동 준비중</span>';
    return `<div class="model-item ${sel?'selected':''}${disabledCls}" onclick="toggleModel('${key.replace(/'/g,"\\'")}')">
      <span class="model-check">${sel ? '✓' : ''}</span>
      <span class="model-name"><b>${escHtml(m.name)}</b><span>${escHtml(m.vendor)}</span></span>
      ${badge || `<span class="model-flag">${m.country}</span>`}
    </div>`;
  }).join('');

  const cnt = document.querySelector('.ensemble-count');
  if (modelMode === 'ensemble') {
    if (!cnt) {
      const div = document.createElement('div');
      div.className = 'ensemble-count show';
      document.getElementById('model-search').insertAdjacentElement('afterend', div);
    }
    document.querySelector('.ensemble-count').textContent = `${selectedModels.length}개 모델 선택됨 — 서로 논쟁하여 결론을 도출합니다`;
    document.querySelector('.ensemble-count').classList.add('show');
  } else if (cnt) {
    cnt.classList.remove('show');
  }
}
// 저장된 모드를 시트 버튼에 즉시 반영(최초 로드 시)
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('mode-single')?.classList.toggle('active', modelMode === 'single');
  document.getElementById('mode-ensemble')?.classList.toggle('active', modelMode === 'ensemble');
});

// ══════════════════════════════════════════════════════════════
// 음성 입력 (K-Law 모바일과 동일한 v3.6 패턴)
// ══════════════════════════════════════════════════════════════
let isRecording = false;
let recognition = null;

function _detectMicEnv() {
  const inIframe   = window.self !== window.top;
  const isSecure   = window.isSecureContext;
  const isArtifact = location.hostname.includes('claude') || location.hostname.includes('artifact');
  return { inIframe, isSecure, isArtifact };
}
async function _checkMicPermission() {
  if (!navigator.permissions) return 'unknown';
  try { const r = await navigator.permissions.query({ name:'microphone' }); return r.state; } catch(e) { return 'unknown'; }
}
function _micShowMsg(html, type = 'warn') {
  document.getElementById('mic-msg')?.remove();
  const colors = { warn:{bg:'#FFF3CD',bd:'#FDE68A',tx:'#78350F'}, error:{bg:'#FEE2E2',bd:'#FCA5A5',tx:'#7F1D1D'}, info:{bg:'#EFF6FF',bd:'#BFDBFE',tx:'#1E3A5F'} }[type] || {};
  const div = document.createElement('div');
  div.id = 'mic-msg';
  div.style.cssText = `background:${colors.bg};border:1px solid ${colors.bd};color:${colors.tx};`;
  div.innerHTML = html;
  document.getElementById('input-bar').insertAdjacentElement('beforebegin', div);
  setTimeout(() => div.remove(), 12000);
}
function _micSetIdle(btn) {
  isRecording = false; btn.classList.remove('recording');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0"/><line x1="12" y1="22" x2="12" y2="18"/><line x1="8" y1="22" x2="16" y2="22"/></svg>';
  recognition = null;
}
function _micSetActive(btn) {
  isRecording = true; btn.classList.add('recording');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
}
function _micAutoResize(ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; }
function _updateSendBtn() {
  const ta = document.getElementById('chat-input');
  document.getElementById('send-btn').classList.toggle('active', ta.value.trim().length > 0);
}

async function toggleMic() {
  const btn = document.getElementById('mic-btn');
  const ta  = document.getElementById('chat-input');
  if (isRecording) { recognition && recognition.stop(); return; }

  const env = _detectMicEnv();
  if (env.isArtifact || env.inIframe) { _micShowMsg('<strong>🎙️ 미리보기 환경에서는 마이크를 사용할 수 없습니다.</strong><br>실제 배포 URL에서 사용하세요.', 'info'); return; }
  if (!env.isSecure) { _micShowMsg('<strong>🎙️ HTTPS가 아닌 환경에서는 마이크를 사용할 수 없습니다.</strong>', 'error'); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { _micShowMsg('⚠️ 이 브라우저는 음성-텍스트 변환을 지원하지 않습니다.<br>Chrome 또는 Edge를 사용해 주세요.', 'warn'); return; }
  const perm = await _checkMicPermission();
  if (perm === 'denied') { _micShowMsg('<strong>🎙️ 마이크 권한이 차단되어 있습니다.</strong><br>주소창 왼쪽 🔒 → 사이트 설정 → 마이크 → 허용 후 새로고침하세요.', 'error'); return; }

  recognition = new SR();
  recognition.lang = 'ko-KR'; recognition.continuous = true; recognition.interimResults = true; recognition.maxAlternatives = 1;
  let finalText = ta.value; let interim = '';

  recognition.onstart = () => { _micSetActive(btn); document.getElementById('mic-msg')?.remove(); };
  recognition.onresult = (e) => {
    interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    ta.value = finalText + interim; _micAutoResize(ta);
  };
  recognition.onend = () => { _micSetIdle(btn); ta.value = finalText; _micAutoResize(ta); _updateSendBtn(); };
  recognition.onerror = (e) => {
    _micSetIdle(btn);
    const msgs = {
      'not-allowed': ['마이크 권한이 거부되었습니다.<br>주소창 🔒 → 사이트 설정 → 마이크 → 허용 후 새로고침하세요.', 'error'],
      'service-not-allowed': ['음성 인식 서비스가 허용되지 않았습니다.', 'error'],
      'network': ['네트워크 오류로 음성 인식에 실패했습니다.', 'warn'],
      'no-speech': ['음성이 감지되지 않았습니다. 마이크에 가까이 대고 다시 시도하세요.', 'warn'],
      'audio-capture': ['마이크를 찾을 수 없습니다.', 'error'],
    };
    if (e.error !== 'aborted' && msgs[e.error]) _micShowMsg('🎙️ ' + msgs[e.error][0], msgs[e.error][1]);
  };
  recognition.start();
}

// ══════════════════════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('chat-input');
  ta.addEventListener('input', () => { _micAutoResize(ta); _updateSendBtn(); });
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
});
</script>
